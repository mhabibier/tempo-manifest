# ConfigMap for Grafana Tempo
# Identik dengan Docker Compose config — tempo.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: tempo
  labels:
    app.kubernetes.io/name:      tempo
    app.kubernetes.io/component: config
data:
  tempo.yaml: |
    # Grafana Tempo 2.5.0 — distributed tracing backend

    stream_over_http_enabled: true

    server:
      http_listen_port: 3200
      log_level: info

    # Trace data storage
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    # OTLP receivers — Alloy forwards traces here
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"

    # Ingester — batch settings before writing blocks
    ingester:
      max_block_bytes:    1_000_000
      max_block_duration: 5m
      trace_idle_period:  10s

    # Compactor — block retention
    compactor:
      compaction:
        block_retention: 48h

    # Query frontend
    query_frontend:
      search:
        duration_slo:         5s
        throughput_bytes_slo: 1.073741824e+09
