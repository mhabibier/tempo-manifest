# Services for Grafana Tempo
#
# 1. ClusterIP — Alloy forward traces ke Tempo (internal)
# 2. NodePort  — Grafana eksternal query traces dari Tempo
#    Akses Tempo: http://<node-ip>:30200

apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: tempo
  labels:
    app.kubernetes.io/name:      tempo
    app.kubernetes.io/component: trace-storage
spec:
  type: ClusterIP
  selector:
    app: tempo
  ports:
    - name:       http
      port:       3200
      targetPort: http
      protocol:   TCP
    - name:       otlp-grpc
      port:       4317
      targetPort: otlp-grpc
      protocol:   TCP
    - name:       otlp-http
      port:       4318
      targetPort: otlp-http
      protocol:   TCP

---

apiVersion: v1
kind: Service
metadata:
  name: tempo-np
  namespace: tempo
  labels:
    app.kubernetes.io/name:      tempo
    app.kubernetes.io/component: trace-storage-nodeport
spec:
  type: NodePort
  selector:
    app: tempo
  ports:
    - name:       http
      port:       3200
      targetPort: http
      protocol:   TCP
      nodePort:   30200   # Grafana datasource Tempo: http://<node-ip>:30200
